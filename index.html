<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniFinance | CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Iceland&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: { 'xs': '380px' },
                    fontSize: { 'xxs': ['0.625rem', { lineHeight: '0.875rem' }] }
                }
            }
        }
    </script>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); --px: 5px; color-scheme: dark; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        /* Updated Font Family */
        body { font-family: 'Iceland', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        @keyframes fadeInUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
        .tab-active { color: #60a5fa !important; } /* Adjusted for dark mode */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .px-app { padding-left: var(--px); padding-right: var(--px); }

        /* Responsive text using clamp */
        .t-xs { font-size: clamp(10px, 2.5vw, 13px); } /* Bumped slightly for Iceland readability */
        .t-sm { font-size: clamp(12px, 3.2vw, 15px); }
        .t-base { font-size: clamp(14px, 3.8vw, 18px); }
        .t-lg { font-size: clamp(16px, 4.5vw, 20px); }
        .t-xl { font-size: clamp(20px, 5.5vw, 26px); }
        .t-2xl { font-size: clamp(24px, 6.5vw, 32px); }
        .t-3xl { font-size: clamp(28px, 7.5vw, 40px); }

        .card { border-radius: clamp(12px, 3vw, 20px); }
        .card-sm { border-radius: clamp(8px, 2vw, 14px); }
        .stat-card { padding: clamp(8px, 2.5vw, 20px); border-radius: clamp(12px, 3vw, 20px); }
        .field-input { padding: clamp(8px, 2.5vw, 14px); border-radius: clamp(10px, 2.5vw, 16px); }
        .btn-primary { padding: clamp(10px, 3vw, 16px); border-radius: clamp(10px, 2.5vw, 16px); font-weight: 700; }
        input, select, textarea { font-size: clamp(13px, 3.5vw, 16px) !important; font-family: 'Iceland', sans-serif !important; }

        .badge { font-size: clamp(9px, 2vw, 12px); padding: 2px 6px; border-radius: 6px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
        .nowrap { white-space: nowrap; }
        .gap-c { gap: clamp(4px, 1vw, 10px); }
        .gap-cs { gap: clamp(2px, 0.5vw, 6px); }
        .mb-c { margin-bottom: clamp(6px, 1.5vw, 14px); }
        .mb-cl { margin-bottom: clamp(10px, 2.5vw, 24px); }
        .p-c { padding: clamp(6px, 1.5vw, 14px); }
        .p-cl { padding: clamp(10px, 2.5vw, 20px); }

        #main-content { padding: 5px; padding-bottom: 80px; }
        #bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); }

        .prop-residential { border-left: 3px solid #3b82f6; }
        .prop-commercial { border-left: 3px solid #8b5cf6; }
        .prop-land { border-left: 3px solid #f59e0b; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
        .modal-content { background: #1e293b; border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 16px 5px; }

        /* Desktop wide layout */
        @media (min-width: 768px) {
            :root { --px: 12px; }
            #main-content { padding: 16px 24px 90px; max-width: 1200px; margin: 0 auto; width: 100%; }
            .stat-card { padding: 20px; }
            .field-input { padding: 14px; }
            #bottom-nav { display: none !important; }
            #desktop-sidebar { display: flex !important; }
            #view-main { flex-direction: row !important; }
            .mobile-header-avatar { display: none !important; }
        }
        @media (max-width: 767px) {
            #desktop-sidebar { display: none !important; }
        }

        /* Chart container */
        .chart-container { position: relative; width: 100%; }
        .chart-container canvas { width: 100% !important; }

        /* Smooth scrollbar for desktop */
        @media (min-width: 768px) {
            #main-content::-webkit-scrollbar { width: 6px; }
            #main-content::-webkit-scrollbar-track { background: #0f172a; }
            #main-content::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        }

        /* ========================================================= */
        /* DARK THEME GLOBAL OVERRIDES                               */
        /* ========================================================= */
        
        body, .bg-slate-50 { background-color: #0f172a !important; color: #f8fafc !important; }
        .bg-white { background-color: #1e293b !important; color: #f8fafc !important; }
        .border-slate-50, .border-slate-100, .border-slate-200 { border-color: #334155 !important; }
        .text-slate-900 { color: #f8fafc !important; }
        .text-slate-500, .text-slate-400 { color: #94a3b8 !important; }
        .text-slate-300 { color: #64748b !important; }
        .divide-slate-50 > :not([hidden]) ~ :not([hidden]) { border-color: #334155 !important; }
        
        /* Inputs & Forms */
        input, select, textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
        
        /* Interactive States */
        .hover\:bg-slate-50:hover { background-color: #0f172a !important; }
        .hover\:bg-slate-100:hover { background-color: #334155 !important; }
        
        /* Colored Backgrounds & Text (Adapted for Dark Mode Contrast) */
        .bg-blue-50 { background-color: #172554 !important; }
        .bg-blue-100 { background-color: #1e3a8a !important; }
        .text-blue-600 { color: #60a5fa !important; }
        .text-blue-700 { color: #93c5fd !important; }
        
        .bg-emerald-50 { background-color: #022c22 !important; }
        .bg-emerald-100 { background-color: #064e3b !important; }
        .text-emerald-600, .text-emerald-700 { color: #34d399 !important; }
        .text-emerald-800 { color: #6ee7b7 !important; }
        
        .bg-red-50 { background-color: #450a0a !important; }
        .bg-red-100 { background-color: #7f1d1d !important; }
        .text-red-600, .text-red-700 { color: #f87171 !important; }
        .text-red-800, .text-red-900 { color: #fca5a5 !important; }
        
        .bg-amber-50 { background-color: #451a03 !important; }
        .bg-amber-100 { background-color: #78350f !important; }
        .text-amber-500, .text-amber-600, .text-amber-700 { color: #fbbf24 !important; }
        .text-amber-800, .text-amber-900 { color: #fcd34d !important; }
        
        .bg-purple-50 { background-color: #2e1065 !important; }
        .bg-purple-100 { background-color: #4c1d95 !important; }
        .text-purple-600, .text-purple-700 { color: #c084fc !important; }
        .text-purple-800, .text-purple-900 { color: #e9d5ff !important; }

        .bg-orange-500 { background-color: #ea580c !important; }
        
        /* Chart specific dark mode filter to keep charts looking good without JS changes */
        .chart-container canvas { filter: invert(0.85) hue-rotate(180deg); }
    </style>
</head>

const calculateEMI = (a, r, t) => {
    const p = parseFloat(a), fi = p * (parseFloat(r)/100) * (parseInt(t)/12);
    return { totalPayable: p+fi, emi: ((p+fi)/parseInt(t)).toFixed(2) };
};
const getLoanStats = (id) => {
    const l = db.loans.find(x=>x.id===id); if(!l) return null;
    const paid = db.payments.filter(p=>p.loanId===id).reduce((s,p)=>s+p.amount,0);
    const {totalPayable,emi} = calculateEMI(l.amount,l.interest,l.tenure);
    return {...l, totalPayable, paid, balance:totalPayable-paid, emi};
};
const getOverdueLoans = () => {
    const now = new Date();
    return db.loans.filter(l => {
        if(l.status!=='Active') return false;
        const mp = Math.max(0, Math.floor((now - new Date(l.startDate))/(1000*60*60*24*30)));
        if(!mp) return false;
        const s = getLoanStats(l.id);
        return s.paid < mp * parseFloat(s.emi) * 0.9;
    });
};
const fmt = n => { n=parseFloat(n); if(n>=10000000) return '₹'+(n/10000000).toFixed(1)+'Cr'; if(n>=100000) return '₹'+(n/100000).toFixed(1)+'L'; if(n>=1000) return '₹'+(n/1000).toFixed(1)+'K'; return '₹'+n.toLocaleString('en-IN'); };
const fmtF = n => '₹'+parseFloat(n).toLocaleString('en-IN');

const compressImage = (file, maxSize=800) => new Promise(res => {
    if(!file || !file.type.startsWith('image/')) return res(null);
    const r = new FileReader();
    r.onload = e => {
        const i = new Image();
        i.onload = () => {
            let w=i.width, h=i.height;
            if(w>h && w>maxSize) { h*=maxSize/w; w=maxSize; } else if(h>w && h>maxSize) { w*=maxSize/h; h=maxSize; }
            const c = document.createElement('canvas'); c.width=w; c.height=h;
            c.getContext('2d').drawImage(i,0,0,w,h);
            res(c.toDataURL('image/jpeg',0.6));
        };
        i.src = e.target.result;
    };
    r.readAsDataURL(file);
});

        <div class="grid grid-cols-2 gap-c"><div><label class="t-xs font-bold text-slate-400 ml-0.5">Date *</label><input required name="date" type="date" value="${td}" class="w-full field-input bg-white border border-slate-100 outline-none shadow-sm"></div><div><label class="t-xs font-bold text-slate-400 ml-0.5">Priority</label><select name="priority" class="w-full field-input bg-white border border-slate-100 outline-none shadow-sm"><option>Medium</option><option>High</option><option>Low</option></select></div></div>
        <div><label class="t-xs font-bold text-slate-400 ml-0.5">Related To</label><input name="relatedTo" class="w-full field-input bg-white border border-slate-100 outline-none shadow-sm"></div>
        <button type="submit" class="w-full btn-primary bg-orange-500 text-white shadow-lg mt-2 t-base">Save Reminder</button></form>`;

    // ===== SETTINGS =====
    if (tab === 'profile') return `
        <div class="flex items-center gap-2 mb-cl"><button onclick="switchTab('home')" class="p-1.5 bg-white rounded-full border border-slate-100 shadow-sm"><i data-lucide="arrow-left" class="w-4 h-4"></i></button><h2 class="t-lg font-bold">Settings</h2></div>
        <div class="text-center mt-cl">
            <div class="w-16 h-16 card bg-white border border-slate-100 shadow-sm mx-auto mb-c overflow-hidden"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=FinanceManager" class="w-full h-full"></div>
            <h3 class="t-lg font-black">Finance Admin</h3><p class="text-slate-400 t-sm">License: FIN-99281</p>
            <div class="mt-cl space-y-1 text-left max-w-md mx-auto">
                <button onclick="exportData()" class="w-full p-c bg-white border border-slate-100 card-sm font-bold t-sm flex items-center justify-between shadow-sm hover:bg-slate-50"><span class="flex items-center gap-2 nowrap"><i data-lucide="download" class="w-4 h-4 text-slate-400"></i> Export Backup</span><i data-lucide="chevron-right" class="w-4 h-4 text-blue-600"></i></button>
                <button onclick="importData()" class="w-full p-c bg-white border border-slate-100 card-sm font-bold t-sm flex items-center justify-between shadow-sm hover:bg-slate-50"><span class="flex items-center gap-2 nowrap"><i data-lucide="upload" class="w-4 h-4 text-slate-400"></i> Import Data</span><i data-lucide="chevron-right" class="w-4 h-4 text-blue-600"></i></button>
                <div class="pt-cl"><button onclick="if(confirm('Wipe ALL data permanently? Demo data will reload.')){localStorage.clear();location.reload();}" class="w-full p-c bg-red-50 text-red-600 card-sm font-bold t-sm shadow-sm flex items-center justify-center gap-2 hover:bg-red-100"><i data-lucide="trash-2" class="w-4 h-4"></i><span class="nowrap">Reset All Data</span></button></div>
            </div>
        </div>`;

    return '<p class="text-center text-slate-400 py-8">Page not found.</p>';
}

function exportData() {
    const d={borrowers:db.borrowers,loans:db.loans,payments:db.payments,properties:db.properties,agents:db.agents,expenses:db.expenses,commissions:db.commissions,reminders:db.reminders};
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`omnifinance_${today()}.json`;a.click();URL.revokeObjectURL(u);
}
function importData() {
    const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0],r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(confirm('Import data? This will MERGE.')){['borrowers','loans','payments','properties','agents','expenses','commissions','reminders'].forEach(k=>{if(d[k])db[k].push(...d[k]);});db.save();switchTab('home');alert('Imported!');}}catch(e){alert('Invalid file.');}};r.readAsText(f);};i.click();
}

lucide.createIcons();
</script>
</body>
