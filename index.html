<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniFinance | CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: { 'xs': '380px' },
                    fontSize: { 'xxs': ['0.625rem', { lineHeight: '0.875rem' }] }
                }
            }
        }
        
        // Initialize theme early to prevent flash
        if (localStorage.getItem('of_theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); --px: 5px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        
        /* Smooth transitions for theme switching */
        body * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease; }
        
        .app-container { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        @keyframes fadeInUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
        .tab-active { color: #2563eb !important; }
        .dark .tab-active { color: #60a5fa !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .px-app { padding-left: var(--px); padding-right: var(--px); }

        /* Responsive text using clamp */
        .t-xs { font-size: clamp(8px, 2.2vw, 11px); }
        .t-sm { font-size: clamp(10px, 2.8vw, 13px); }
        .t-base { font-size: clamp(12px, 3.2vw, 15px); }
        .t-lg { font-size: clamp(14px, 3.8vw, 18px); }
        .t-xl { font-size: clamp(16px, 4.5vw, 24px); }
        .t-2xl { font-size: clamp(18px, 5.5vw, 30px); }
        .t-3xl { font-size: clamp(22px, 6.5vw, 36px); }

        /* 5dp Border Radius Everywhere */
        .card, .card-sm, .stat-card, .field-input, .btn-primary, .badge, select, input, textarea { 
            border-radius: 5px !important; 
        }
        
        .stat-card { padding: clamp(8px, 2.5vw, 20px); }
        .field-input { padding: clamp(8px, 2.5vw, 14px); }
        .btn-primary { padding: clamp(10px, 3vw, 16px); font-weight: 700; }
        input, select, textarea { font-size: clamp(13px, 3.5vw, 16px) !important; color: inherit; }

        .badge { font-size: clamp(7px, 1.8vw, 10px); padding: 2px 6px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
        .nowrap { white-space: nowrap; }
        .gap-c { gap: clamp(4px, 1vw, 10px); }
        .gap-cs { gap: clamp(2px, 0.5vw, 6px); }
        .mb-c { margin-bottom: clamp(6px, 1.5vw, 14px); }
        .mb-cl { margin-bottom: clamp(10px, 2.5vw, 24px); }
        .p-c { padding: clamp(6px, 1.5vw, 14px); }
        .p-cl { padding: clamp(10px, 2.5vw, 20px); }

        #main-content { padding: 5px; padding-bottom: 80px; }
        #bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); }

        .prop-residential { border-left: 3px solid #3b82f6; }
        .prop-commercial { border-left: 3px solid #8b5cf6; }
        .prop-land { border-left: 3px solid #f59e0b; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
        .modal-content { border-radius: 5px 5px 0 0 !important; width: 100%; max-height: 85vh; overflow-y: auto; padding: 16px 5px; }

        /* Desktop wide layout */
        @media (min-width: 768px) {
            :root { --px: 12px; }
            #main-content { padding: 16px 24px 90px; max-width: 1200px; margin: 0 auto; width: 100%; }
            .stat-card { padding: 20px; }
            .field-input { padding: 14px; }
            #bottom-nav { display: none !important; }
            #desktop-sidebar { display: flex !important; }
            #view-main { flex-direction: row !important; }
            .mobile-header-avatar { display: none !important; }
        }
        @media (max-width: 767px) {
            #desktop-sidebar { display: none !important; }
        }

        /* Chart container */
        .chart-container { position: relative; width: 100%; }
        .chart-container canvas { width: 100% !important; }

        /* Smooth scrollbar for desktop */
        @media (min-width: 768px) {
            #main-content::-webkit-scrollbar { width: 6px; }
            #main-content::-webkit-scrollbar-track { background: transparent; }
            #main-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
            .dark #main-content::-webkit-scrollbar-thumb { background: #475569; }
        }
    </style>
</head>

<div id="modal-container" class="hidden"></div>

<script>
// ===== THEME TOGGLE =====
function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('of_theme', isDark ? 'dark' : 'light');
    if (document.getElementById('main-content').innerHTML !== '') {
        switchTab(state.tab, state.activeLoanId || state.activePropertyId || state.activeAgentId);
    }
}

// ===== DUMMY DATA SEEDER =====
function seedDummyData() {
    if (localStorage.getItem('of_seeded')) return;
    
    const borrowers = [
        { id:'B1', name:'Rajesh Sharma', phone:'9876543210', address:'12 MG Road, Jaipur', aadhaar:'1234-5678-9012', pan:'ABCPS1234R', occupation:'Businessman', creditScore:'720', notes:'Regular client', createdAt:'2024-01-15' },
        { id:'B2', name:'Priya Patel', phone:'9823456789', address:'45 Ring Road, Ahmedabad', aadhaar:'2345-6789-0123', pan:'DEFPP4567S', occupation:'Doctor', creditScore:'780', notes:'', createdAt:'2024-02-10' }
    ];

    const agents = [
        { id:'A1', name:'Ravi Verma', phone:'9988776655', email:'ravi@mail.com', commissionRate:3, specialization:'Property', area:'Jaipur', status:'Active', createdAt:'2024-01-10' }
    ];

    const properties = [
        { id:'PR1', title:'Plot No 45, Mansarovar', type:'Residential', location:'Mansarovar, Jaipur', area:'200', areaUnit:'sqyd', price:3500000, marketValue:4000000, owner:'Rajesh Sharma', ownerPhone:'9876543210', status:'Mortgaged', registryNo:'JR-2024-4521', notes:'Corner plot, prime location', photos:[], createdAt:'2024-01-20' }
    ];

    const loans = [
        { id:'L1', borrowerId:'B1', amount:500000, interest:12, tenure:24, startDate:'2024-02-01', type:'Property', collateral:'Plot No 45 Registry', propertyId:'PR1', agentId:'A1', guarantor:'Mohan Sharma', guarantorPhone:'9811111111', processingFee:5000, status:'Active', borrowerPhotos:[], guarantorPhotos:[], createdAt:'2024-02-01' }
    ];

    const payments = [
        { id:'P1', loanId:'L1', amount:28750, date:'2024-03-01', method:'Cash', notes:'March EMI', receiptNo:'R100001', createdAt:'2024-03-01' },
        { id:'P12', loanId:'L1', amount:28750, date: new Date().toISOString().split('T')[0], method:'Cash', notes:'Today EMI', receiptNo:'R100012', createdAt: new Date().toISOString().split('T')[0] }
    ];

    const expenses = [
        { id:'E1', category:'Office', amount:15000, description:'Monthly rent June', date:'2024-06-01', loanId:'', propertyId:'', createdAt:'2024-06-01' }
    ];

    const commissions = [
        { id:'C1', agentId:'A1', loanId:'L1', amount:'15000', status:'Paid', date:'2024-02-05' }
    ];

    const reminders = [
        { id:'RM1', title:'Follow up Rajesh EMI', date: new Date().toISOString().split('T')[0], priority:'High', relatedTo:'Loan L1', done:false, createdAt:'2024-06-01' }
    ];

    db.borrowers = borrowers; db.loans = loans; db.payments = payments;
    db.properties = properties; db.agents = agents; db.expenses = expenses;
    db.commissions = commissions; db.reminders = reminders;
    db.save();
    localStorage.setItem('of_seeded', '1');
}

// ===== DATA STORE =====
const db = {
    borrowers: JSON.parse(localStorage.getItem('of_borrowers')) || [],
    loans: JSON.parse(localStorage.getItem('of_loans')) || [],
    payments: JSON.parse(localStorage.getItem('of_payments')) || [],
    properties: JSON.parse(localStorage.getItem('of_properties')) || [],
    agents: JSON.parse(localStorage.getItem('of_agents')) || [],
    expenses: JSON.parse(localStorage.getItem('of_expenses')) || [],
    commissions: JSON.parse(localStorage.getItem('of_commissions')) || [],
    reminders: JSON.parse(localStorage.getItem('of_reminders')) || [],
    save() {
        ['borrowers','loans','payments','properties','agents','expenses','commissions','reminders'].forEach(k => localStorage.setItem('of_'+k, JSON.stringify(this[k])));
    }
};

seedDummyData();
// Reload after seed
db.borrowers = JSON.parse(localStorage.getItem('of_borrowers')) || [];
db.loans = JSON.parse(localStorage.getItem('of_loans')) || [];
db.payments = JSON.parse(localStorage.getItem('of_payments')) || [];
db.properties = JSON.parse(localStorage.getItem('of_properties')) || [];
db.agents = JSON.parse(localStorage.getItem('of_agents')) || [];
db.expenses = JSON.parse(localStorage.getItem('of_expenses')) || [];
db.commissions = JSON.parse(localStorage.getItem('of_commissions')) || [];
db.reminders = JSON.parse(localStorage.getItem('of_reminders')) || [];

let state = { tab:'home', activeLoanId:null, activePropertyId:null, activeAgentId:null };
let chartInstances = {};

// ===== CALCULATIONS =====
const calculateEMI = (a, r, t) => {
    const p = parseFloat(a), fi = p * (parseFloat(r)/100) * (parseInt(t)/12);
    return { totalPayable: p+fi, emi: ((p+fi)/parseInt(t)).toFixed(2) };
};
const getLoanStats = (id) => {
    const l = db.loans.find(x=>x.id===id); if(!l) return null;
    const paid = db.payments.filter(p=>p.loanId===id).reduce((s,p)=>s+p.amount,0);
    const {totalPayable,emi} = calculateEMI(l.amount,l.interest,l.tenure);
    return {...l, totalPayable, paid, balance:totalPayable-paid, emi};
};
const getOverdueLoans = () => {
    const now = new Date();
    return db.loans.filter(l => {
        if(l.status!=='Active') return false;
        const mp = Math.max(0, Math.floor((now - new Date(l.startDate))/(1000*60*60*24*30)));
        if(!mp) return false;
        const s = getLoanStats(l.id);
        return s.paid < mp * parseFloat(s.emi) * 0.9;
    });
};
const fmt = n => { n=parseFloat(n); if(n>=10000000) return '₹'+(n/10000000).toFixed(1)+'Cr'; if(n>=100000) return '₹'+(n/100000).toFixed(1)+'L'; if(n>=1000) return '₹'+(n/1000).toFixed(1)+'K'; return '₹'+n.toLocaleString('en-IN'); };
const fmtF = n => '₹'+parseFloat(n).toLocaleString('en-IN');
const today = () => new Date().toISOString().split('T')[0];

const compressImage = (file, maxSize=800) => new Promise(res => {
    if(!file || !file.type.startsWith('image/')) return res(null);
    const r = new FileReader();
    r.onload = e => {
        const i = new Image();
        i.onload = () => {
            let w=i.width, h=i.height;
            if(w>h && w>maxSize) { h*=maxSize/w; w=maxSize; } else if(h>w && h>maxSize) { w*=maxSize/h; h=maxSize; }
            const c = document.createElement('canvas'); c.width=w; c.height=h;
            c.getContext('2d').drawImage(i,0,0,w,h);
            res(c.toDataURL('image/jpeg',0.6));
        };
        i.src = e.target.result;
    };
    r.readAsDataURL(file);
});

async function createLoan(e) { 
    e.preventDefault(); 
    const btn = e.target.querySelector('button[type="submit"]'); 
    btn.innerText = 'Processing Images...'; 
    btn.disabled = true; 
    
    const f = new FormData(e.target); 
    const bInput = e.target.querySelector('input[name="borrowerPhotos"]');
    const gInput = e.target.querySelector('input[name="guarantorPhotos"]');
    
    const borrowerPhotos = [];
    if(bInput && bInput.files.length) {
        for(let i=0; i<Math.min(bInput.files.length, 2); i++) { // Max 2 files
            const b64 = await compressImage(bInput.files[i]);
            if(b64) borrowerPhotos.push(b64);
        }
    }
    
    const guarantorPhotos = [];
    if(gInput && gInput.files.length) {
        for(let i=0; i<Math.min(gInput.files.length, 2); i++) { // Max 2 files
            const b64 = await compressImage(gInput.files[i]);
            if(b64) guarantorPhotos.push(b64);
        }
    }

    const loan={id:'L'+Date.now(),borrowerId:f.get('borrowerId'),amount:parseFloat(f.get('amount')),interest:parseFloat(f.get('interest')),tenure:parseInt(f.get('tenure')),startDate:f.get('startDate'),type:f.get('loanType')||'Personal',collateral:f.get('collateral')||'',propertyId:f.get('propertyId')||'',agentId:f.get('agentId')||'',guarantor:f.get('guarantor')||'',guarantorPhone:f.get('guarantorPhone')||'',processingFee:parseFloat(f.get('processingFee'))||0,status:'Active',createdAt:today(), borrowerPhotos, guarantorPhotos}; 
    
    db.loans.push(loan); 
    if(loan.agentId){
        const ag=db.agents.find(a=>a.id===loan.agentId);
        if(ag) db.commissions.push({id:'C'+Date.now(),agentId:loan.agentId,loanId:loan.id,amount:(loan.amount*ag.commissionRate/100).toFixed(2),status:'Pending',date:today()});
    } 
    db.save(); switchTab('loans'); 
}

// ===== CHART INITIALIZATION =====
function initCharts(tab) {
    const isDark = document.documentElement.classList.contains('dark');
    const gridColor = isDark ? '#334155' : '#f1f5f9';
    const textColor = isDark ? '#94a3b8' : '#64748b';

    if (tab === 'home') {
        const ctx1 = document.getElementById('chart-monthly');
        if (ctx1) {
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const monthData = months.map((m,i) => {
                const mo = String(i+1).padStart(2,'0');
                return db.payments.filter(p => p.date && p.date.substring(5,7) === mo).reduce((s,p) => s+p.amount, 0);
            });
            chartInstances.monthly = new Chart(ctx1, {
                type: 'bar',
                data: { labels: months, datasets: [{ label: 'Collections', data: monthData, backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 5, barThickness: window.innerWidth < 500 ? 12 : 20 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: textColor, callback: v => fmt(v), font: { size: 9 } }, grid: { color: gridColor } }, x: { ticks: { color: textColor, font: { size: 9 } }, grid: { display: false } } } }
            });
        }
        const ctx2 = document.getElementById('chart-loan-types');
        if (ctx2) {
            const types = ['Personal','Property','Business','Gold','Vehicle','Other'];
            const tData = types.map(t => db.loans.filter(l => (l.type||'Personal') === t).length).filter((_,i) => types[i]);
            const tLabels = types.filter((_,i) => tData[i] > 0);
            const tVals = tData.filter(v => v > 0);
            chartInstances.loanTypes = new Chart(ctx2, {
                type: 'doughnut',
                data: { labels: tLabels, datasets: [{ data: tVals, backgroundColor: ['#3b82f6','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#6b7280'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { color: textColor, boxWidth: 10, padding: 8, font: { size: 10 } } } } }
            });
        }
    }
    if (tab === 'reports') {
        const ctx3 = document.getElementById('chart-income-expense');
        if (ctx3) {
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const incData = months.map((m,i) => { const mo=String(i+1).padStart(2,'0'); return db.payments.filter(p=>p.date?.substring(5,7)===mo).reduce((s,p)=>s+p.amount,0); });
            const expData = months.map((m,i) => { const mo=String(i+1).padStart(2,'0'); return db.expenses.filter(e=>e.date?.substring(5,7)===mo).reduce((s,e)=>s+e.amount,0); });
            chartInstances.incExp = new Chart(ctx3, {
                type: 'line',
                data: { labels: months, datasets: [
                    { label: 'Income', data: incData, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4, pointRadius: 2 },
                    { label: 'Expenses', data: expData, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.4, pointRadius: 2 }
                ] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor, boxWidth: 10, font: { size: 10 } } } }, scales: { y: { beginAtZero: true, ticks: { color: textColor, callback: v=>fmt(v), font:{size:9} }, grid:{color:gridColor} }, x: { ticks:{color: textColor, font:{size:9}}, grid:{display:false} } } }
            });
        }
        const ctx4 = document.getElementById('chart-property-types');
        if (ctx4) {
            const pt = ['Residential','Commercial','Land','Agricultural','Industrial'];
            const ptD = pt.map(t => db.properties.filter(p=>p.type===t).length);
            chartInstances.propTypes = new Chart(ctx4, {
                type: 'polarArea',

            });
        }
    }
}

        <div><label class="t-xs font-bold text-slate-400 ml-0.5">Category *</label><select required name="category" class="${fInputClass}"><option>Office</option><option>Travel</option><option>Legal</option><option>Registration</option><option>Commission Paid</option><option>Salary</option><option>Miscellaneous</option></select></div>
        <div><label class="t-xs font-bold text-slate-400 ml-0.5">Amount ₹ *</label><input required name="amount" type="number" class="${fInputClass}"></div>
        <div><label class="t-xs font-bold text-slate-400 ml-0.5">Description</label><input name="description" class="${fInputClass}"></div>
        <div><label class="t-xs font-bold text-slate-400 ml-0.5">Date *</label><input required name="date" type="date" value="${td}" class="${fInputClass}"></div>
        <button type="submit" class="w-full btn-primary bg-red-500 text-white shadow-lg dark:shadow-none mt-2 t-base">Save Expense</button></form>`;

    if (tab === 'reminder-create') return `${backBtn('reminders')}<form onsubmit="addReminder(event)" class="space-y-2">
        <div><label class="t-xs font-bold text-slate-400 ml-0.5">Title *</label><input required name="title" placeholder="e.g. Follow up with Ravi" class="${fInputClass}"></div>
        <div class="grid grid-cols-2 gap-c"><div><label class="t-xs font-bold text-slate-400 ml-0.5">Date *</label><input required name="date" type="date" value="${td}" class="${fInputClass}"></div><div><label class="t-xs font-bold text-slate-400 ml-0.5">Priority</label><select name="priority" class="${fInputClass}"><option>Medium</option><option>High</option><option>Low</option></select></div></div>
        <div><label class="t-xs font-bold text-slate-400 ml-0.5">Related To</label><input name="relatedTo" class="${fInputClass}"></div>
        <button type="submit" class="w-full btn-primary bg-orange-500 text-white shadow-lg dark:shadow-none mt-2 t-base">Save Reminder</button></form>`;

    if (tab === 'profile') return `
        <div class="flex items-center gap-2 mb-cl">
            <button onclick="switchTab('home')" class="p-1.5 bg-white dark:bg-slate-800 rounded-[5px] border border-slate-100 dark:border-slate-700 shadow-sm"><i data-lucide="arrow-left" class="w-4 h-4 text-slate-900 dark:text-slate-100"></i></button>
            <h2 class="t-lg font-bold text-slate-900 dark:text-slate-100">My Profile</h2>
        </div>
        
        <div class="bg-white dark:bg-slate-800 rounded-[5px] border border-slate-100 dark:border-slate-700 overflow-hidden mb-cl shadow-sm">
            <div class="h-24 md:h-32 bg-gradient-to-r from-blue-600 to-indigo-700 w-full relative"></div>
            <div class="px-app pb-app relative">
                <div class="w-20 h-20 md:w-24 md:h-24 rounded-[5px] border-4 border-white dark:border-slate-800 bg-slate-100 dark:bg-slate-700 mx-auto md:mx-0 md:-mt-12 -mt-10 overflow-hidden shadow-md relative z-10 flex items-center justify-center">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=AksharChaudhary" class="w-full h-full object-cover">
                </div>
                <div class="text-center md:text-left mt-3 md:mt-2 md:ml-28 md:-mt-10">
                    <h3 class="t-xl font-black text-slate-900 dark:text-slate-100">Akshar Chaudhary</h3>
                    <p class="text-slate-500 dark:text-slate-400 t-sm font-medium">Chief Finance Admin · XRV LABS</p>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-0 border-t border-slate-50 dark:border-slate-700">
                <div class="p-cl border-b md:border-b-0 md:border-r border-slate-50 dark:border-slate-700 space-y-3">
                    <h4 class="t-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Contact Details</h4>
                    <div class="flex items-center gap-3 t-sm"><i data-lucide="mail" class="w-4 h-4 text-slate-400"></i><span class="text-slate-700 dark:text-slate-300">admin@xrvlabs.com</span></div>
                    <div class="flex items-center gap-3 t-sm"><i data-lucide="phone" class="w-4 h-4 text-slate-400"></i><span class="text-slate-700 dark:text-slate-300">+91 98765 43210</span></div>
                    <div class="flex items-center gap-3 t-sm"><i data-lucide="map-pin" class="w-4 h-4 text-slate-400"></i><span class="text-slate-700 dark:text-slate-300">Delhi, India</span></div>
                </div>
                <div class="p-cl space-y-3">
                    <h4 class="t-xs font-bold text-slate-400 uppercase tracking-wider mb-2">System Details</h4>
                    <div class="flex items-center justify-between t-sm"><span class="text-slate-500">License ID</span><span class="font-bold text-slate-900 dark:text-slate-100">FIN-99281</span></div>
                    <div class="flex items-center justify-between t-sm"><span class="text-slate-500">Role</span><span class="badge bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-transparent dark:border-slate-700">Superadmin</span></div>
                    <div class="flex items-center justify-between t-sm"><span class="text-slate-500">Status</span><span class="flex items-center gap-1 text-emerald-600 dark:text-emerald-400 font-bold"><div class="w-2 h-2 rounded-full bg-emerald-500"></div> Active</span></div>
                </div>
            </div>
        </div>

        <h3 class="t-xs font-bold text-slate-400 uppercase mb-c">Data Management</h3>
        <div class="bg-white dark:bg-slate-800 rounded-[5px] border border-slate-100 dark:border-slate-700 overflow-hidden divide-y divide-slate-50 dark:divide-slate-700 shadow-sm mb-cl">
            <button onclick="exportData()" class="w-full p-c flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-[5px] bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center"><i data-lucide="download" class="w-4 h-4"></i></div><div class="text-left"><p class="t-sm font-bold text-slate-900 dark:text-slate-100">Export Backup</p><p class="t-xs text-slate-400">Save all local CRM data as JSON</p></div></div>
                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 dark:text-slate-600"></i>
            </button>
            <button onclick="importData()" class="w-full p-c flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-[5px] bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 flex items-center justify-center"><i data-lucide="upload" class="w-4 h-4"></i></div><div class="text-left"><p class="t-sm font-bold text-slate-900 dark:text-slate-100">Import Data</p><p class="t-xs text-slate-400">Restore or merge existing JSON</p></div></div>
                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 dark:text-slate-600"></i>
            </button>
            <button onclick="if(confirm('Wipe ALL data permanently? Demo data will reload.')){localStorage.clear();location.reload();}" class="w-full p-c flex items-center justify-between hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors group">
                <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-[5px] bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 flex items-center justify-center group-hover:bg-red-100 dark:group-hover:bg-red-900/50"><i data-lucide="trash-2" class="w-4 h-4"></i></div><div class="text-left"><p class="t-sm font-bold text-red-600 dark:text-red-400">Reset All Data</p><p class="t-xs text-red-400 dark:text-red-500/70">Warning: This cannot be undone</p></div></div>
                <i data-lucide="chevron-right" class="w-4 h-4 text-red-300 dark:text-red-800"></i>
            </button>
        </div>
        `;

    return '<p class="text-center text-slate-400 py-8">Page not found.</p>';
}

function exportData() {
    const d={borrowers:db.borrowers,loans:db.loans,payments:db.payments,properties:db.properties,agents:db.agents,expenses:db.expenses,commissions:db.commissions,reminders:db.reminders};
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`omnifinance_${today()}.json`;a.click();URL.revokeObjectURL(u);
}
function importData() {
    const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0],r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(confirm('Import data? This will MERGE.')){['borrowers','loans','payments','properties','agents','expenses','commissions','reminders'].forEach(k=>{if(d[k])db[k].push(...d[k]);});db.save();switchTab('home');alert('Imported!');}}catch(e){alert('Invalid file.');}};r.readAsText(f);};i.click();
}

lucide.createIcons();
</script>
