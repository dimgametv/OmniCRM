<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniFinance | CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { screens: { 'xs': '380px' }, fontSize: { 'xxs': ['0.625rem', { lineHeight: '0.875rem' }] } } } }
    </script>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); --px: 5px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        @keyframes fadeInUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
        .tab-active { color: #2563eb !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .px-app { padding-left: var(--px); padding-right: var(--px); }

        .t-xs { font-size: clamp(8px, 2.2vw, 11px); }
        .t-sm { font-size: clamp(10px, 2.8vw, 13px); }
        .t-base { font-size: clamp(12px, 3.2vw, 15px); }
        .t-lg { font-size: clamp(14px, 3.8vw, 18px); }
        .t-xl { font-size: clamp(16px, 4.5vw, 24px); }
        .t-2xl { font-size: clamp(18px, 5.5vw, 30px); }

        .card { border-radius: clamp(12px, 3vw, 20px); }
        .card-sm { border-radius: clamp(8px, 2vw, 14px); }
        .stat-card { padding: clamp(8px, 2.5vw, 20px); border-radius: clamp(12px, 3vw, 20px); }
        .field-input { padding: clamp(8px, 2.5vw, 14px); border-radius: clamp(10px, 2.5vw, 16px); }
        .btn-primary { padding: clamp(10px, 3vw, 16px); border-radius: clamp(10px, 2.5vw, 16px); font-weight: 700; }
        input, select, textarea { font-size: clamp(13px, 3.5vw, 16px) !important; }

        .badge { font-size: clamp(7px, 1.8vw, 10px); padding: 2px 6px; border-radius: 6px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
        .nowrap { white-space: nowrap; }
        .gap-c { gap: clamp(4px, 1vw, 10px); }
        .gap-cs { gap: clamp(2px, 0.5vw, 6px); }
        .mb-c { margin-bottom: clamp(6px, 1.5vw, 14px); }
        .mb-cl { margin-bottom: clamp(10px, 2.5vw, 24px); }
        .p-c { padding: clamp(6px, 1.5vw, 14px); }
        .p-cl { padding: clamp(10px, 2.5vw, 20px); }

        #main-content { padding: 5px; padding-bottom: 80px; }
        #bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); }

        .prop-residential { border-left: 3px solid #3b82f6; }
        .prop-commercial { border-left: 3px solid #8b5cf6; }
        .prop-land { border-left: 3px solid #f59e0b; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
        .modal-content { background: white; border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 16px 5px; }

        @media (min-width: 768px) {
            :root { --px: 12px; }
            #main-content { padding: 16px 24px 90px; max-width: 1200px; margin: 0 auto; width: 100%; }
            .stat-card { padding: 20px; }
            .field-input { padding: 14px; }
            #bottom-nav { display: none !important; }
            #desktop-sidebar { display: flex !important; }
            #view-main { flex-direction: row !important; }
            .mobile-header-avatar { display: none !important; }
            #main-content::-webkit-scrollbar { width: 6px; }
            #main-content::-webkit-scrollbar-track { background: #f1f5f9; }
            #main-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        }
        @media (max-width: 767px) { #desktop-sidebar { display: none !important; } }
        .chart-container { position: relative; width: 100%; }
        .chart-container canvas { width: 100% !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
<div id="app" class="app-container">

    <section id="view-auth" class="flex-1 flex flex-col items-center justify-center px-app bg-white">
        <div class="w-full max-w-sm space-y-6 animate-in" style="padding:0 5px;">
            <div class="text-center">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-4 shadow-xl shadow-blue-100">
                    <i data-lucide="shield-check" class="w-7 h-7"></i>
                </div>
                <h1 class="t-2xl font-extrabold tracking-tight">OmniFinance</h1>
                <p class="text-slate-400 mt-1 font-medium t-sm">Secure Access</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="pin-input" placeholder="Enter 4-Digit PIN" pattern="[0-9]*" inputmode="numeric" maxlength="4" class="w-full field-input bg-slate-50 border border-slate-100 text-center text-2xl tracking-widest font-black outline-none focus:ring-2 focus:ring-blue-600 transition-all">
                <button onclick="handleAuth()" id="login-btn" class="w-full bg-blue-600 text-white btn-primary shadow-lg active:scale-95 transition-all t-base">Unlock Workspace</button>
                <p class="text-center t-xs text-slate-400" id="auth-msg">Default PIN is 1234</p>
            </div>
        </div>
    </section>

    <section id="view-main" class="hidden flex-1 flex flex-col overflow-hidden">
        <aside id="desktop-sidebar" class="hidden w-56 bg-white border-r border-slate-100 flex-col flex-shrink-0 overflow-y-auto">
            <div class="p-5 border-b border-slate-50 flex items-center gap-2">
                <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white"><i data-lucide="landmark" class="w-5 h-5"></i></div>
                <div><p class="font-extrabold text-sm">OmniFinance</p><p class="text-[10px] text-slate-400">v3.0 Secure CRM</p></div>
            </div>
            <nav class="flex-1 p-3 space-y-1">
                ${['home','loans','payments','properties','customers','expenses','reminders','reports'].map(t=>`
                <button onclick="switchTab('${t===`customers`?`borrowers`:t}')" id="side-${t===`customers`?`borrowers`:t}" class="sidebar-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 transition-all capitalize">
                    <i data-lucide="${t==='home'?'layout-grid':t==='loans'?'briefcase':t==='payments'?'wallet':t==='properties'?'home':t==='customers'?'users':t==='expenses'?'trending-down':t==='reminders'?'bell':'bar-chart-3'}" class="w-4 h-4"></i> ${t}
                </button>`).join('')}
            </nav>
            <div class="p-3 border-t border-slate-50">
                <button onclick="switchTab('profile')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50">
                    <i data-lucide="settings" class="w-4 h-4"></i> Settings
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="flex items-center justify-between bg-white border-b border-slate-50 relative z-10" style="padding:10px var(--px);">
                <div class="min-w-0 flex-1 flex items-center gap-2">
                    <div class="md:hidden w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white"><i data-lucide="landmark" class="w-4 h-4"></i></div>
                    <h2 id="app-title" class="t-lg font-bold truncate">Dashboard</h2>
                </div>
                <div class="flex items-center gap-c">
                    <button onclick="openCalculator()" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center relative hover:bg-slate-100">
                        <i data-lucide="calculator" class="w-4 h-4 text-slate-500"></i>
                    </button>
                    <button onclick="showNotifications()" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center relative hover:bg-slate-100">
                        <i data-lucide="bell" class="w-4 h-4 text-slate-500"></i>
                        <span id="notif-badge" class="hidden absolute -top-0.5 -right-0.5 w-3 h-3 bg-red-500 rounded-full border border-white"></span>
                    </button>
                    <button onclick="switchTab('profile')" class="mobile-header-avatar w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center">
                        <i data-lucide="settings" class="w-4 h-4 text-slate-500"></i>
                    </button>
                </div>
            </header>
            
            <div id="search-bar-container" class="hidden bg-white border-b border-slate-50 px-app py-2">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="global-search" onkeyup="filterLists(this.value)" placeholder="Search customers, loans, properties..." class="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 transition-all t-sm">
                </div>
            </div>

            <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar md:overflow-y-scroll relative"></main>
        </div>

        <nav id="bottom-nav" class="flex justify-around items-center bg-white border-t border-slate-100 z-50 md:hidden" style="padding:6px 0;padding-bottom:calc(var(--safe-bottom)+4px);">
            <button id="tab-home" onclick="switchTab('home')" class="flex flex-col items-center gap-cs text-slate-300 min-w-0 flex-1"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="t-xs font-bold nowrap">Home</span></button>
            <button id="tab-loans" onclick="switchTab('loans')" class="flex flex-col items-center gap-cs text-slate-300 min-w-0 flex-1"><i data-lucide="briefcase" class="w-5 h-5"></i><span class="t-xs font-bold nowrap">Loans</span></button>
            <button id="tab-add" onclick="showFabMenu()" class="flex flex-col items-center gap-cs min-w-0 flex-1 relative" style="margin-top:-14px;"><div class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-blue-200"><i data-lucide="plus" class="w-5 h-5"></i></div></button>
            <button id="tab-borrowers" onclick="switchTab('borrowers')" class="flex flex-col items-center gap-cs text-slate-300 min-w-0 flex-1"><i data-lucide="users" class="w-5 h-5"></i><span class="t-xs font-bold nowrap">Clients</span></button>
            <button id="tab-properties" onclick="switchTab('properties')" class="flex flex-col items-center gap-cs text-slate-300 min-w-0 flex-1"><i data-lucide="home" class="w-5 h-5"></i><span class="t-xs font-bold nowrap">Assets</span></button>
        </nav>
    </section>
</div>

<div id="fab-menu" class="hidden fixed inset-0 z-[200]" onclick="closeFabMenu(event)">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
    <div class="absolute bottom-24 right-3 md:bottom-8 md:right-8 flex flex-col gap-c items-end">
        <button onclick="switchTab('borrower-create');closeFabMenu();" class="flex items-center gap-2 bg-white shadow-lg rounded-full py-2 px-3 t-sm font-bold animate-in">
            <span class="nowrap">New Customer</span><div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center"><i data-lucide="user-plus" class="w-4 h-4"></i></div>
        </button>
        <button onclick="switchTab('loan-create');closeFabMenu();" class="flex items-center gap-2 bg-white shadow-lg rounded-full py-2 px-3 t-sm font-bold animate-in" style="animation-delay:50ms">
            <span class="nowrap">Disburse Loan</span><div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center"><i data-lucide="briefcase" class="w-4 h-4"></i></div>
        </button>
        <button onclick="switchTab('payment-entry');closeFabMenu();" class="flex items-center gap-2 bg-white shadow-lg rounded-full py-2 px-3 t-sm font-bold animate-in" style="animation-delay:100ms">
            <span class="nowrap">Record Payment</span><div class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center"><i data-lucide="receipt" class="w-4 h-4"></i></div>
        </button>
        <button onclick="switchTab('property-create');closeFabMenu();" class="flex items-center gap-2 bg-white shadow-lg rounded-full py-2 px-3 t-sm font-bold animate-in" style="animation-delay:150ms">
            <span class="nowrap">Add Property</span><div class="w-8 h-8 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center"><i data-lucide="home" class="w-4 h-4"></i></div>
        </button>
    </div>
</div>
<div id="modal-container" class="hidden"></div>

<script>
// ===== APP SEC & DATA STORE =====
const APP_PIN = localStorage.getItem('of_pin') || '1234';
const db = {
    borrowers: JSON.parse(localStorage.getItem('of_borrowers')) || [],
    loans: JSON.parse(localStorage.getItem('of_loans')) || [],
    payments: JSON.parse(localStorage.getItem('of_payments')) || [],
    properties: JSON.parse(localStorage.getItem('of_properties')) || [],
    expenses: JSON.parse(localStorage.getItem('of_expenses')) || [],
    reminders: JSON.parse(localStorage.getItem('of_reminders')) || [],
    save() { ['borrowers','loans','payments','properties','expenses','reminders'].forEach(k => localStorage.setItem('of_'+k, JSON.stringify(this[k]))); }
};

let state = { tab:'home', activeId:null };
let chartInstances = {};
const today = () => new Date().toISOString().split('T')[0];
const fmt = n => { n=parseFloat(n); if(n>=10000000) return '₹'+(n/10000000).toFixed(2)+'Cr'; if(n>=100000) return '₹'+(n/100000).toFixed(2)+'L'; return '₹'+n.toLocaleString('en-IN'); };
const fmtF = n => '₹'+parseFloat(n).toLocaleString('en-IN');

// ===== ADVANCED CALCULATIONS =====
const calculateEMI = (principal, rate, tenureMonths, type) => {
    const p = parseFloat(principal), r = parseFloat(rate), t = parseInt(tenureMonths);
    if(type === 'Reducing') {
        const monthlyRate = (r / 100) / 12;
        const emi = (p * monthlyRate * Math.pow(1 + monthlyRate, t)) / (Math.pow(1 + monthlyRate, t) - 1);
        const totalPayable = emi * t;
        return { totalPayable, emi: emi.toFixed(2), totalInterest: totalPayable - p };
    } else { // Flat
        const totalInterest = p * (r / 100) * (t / 12);
        const totalPayable = p + totalInterest;
        return { totalPayable, emi: (totalPayable / t).toFixed(2), totalInterest };
    }
};

const getLoanStats = (id) => {
    const l = db.loans.find(x=>x.id===id); if(!l) return null;
    const paidPrincipal = db.payments.filter(p=>p.loanId===id).reduce((s,p)=>s+parseFloat(p.amount),0);
    const {totalPayable, emi, totalInterest} = calculateEMI(l.amount, l.interest, l.tenure, l.interestType);
    return {...l, totalPayable, paid: paidPrincipal, balance: totalPayable - paidPrincipal, emi, totalInterest};
};

const getOverdueLoans = () => {
    const now = new Date();
    return db.loans.filter(l => {
        if(l.status!=='Active') return false;
        const monthsPassed = Math.max(0, Math.floor((now - new Date(l.startDate))/(1000*60*60*24*30)));
        if(!monthsPassed) return false;
        const s = getLoanStats(l.id);
        return s.paid < monthsPassed * parseFloat(s.emi) * 0.9;
    });
};

// ===== UTILS & ACTIONS =====
const compressImage = (file, maxSize=600) => new Promise(res => {
    if(!file || !file.type.startsWith('image/')) return res(null);
    const r = new FileReader();
    r.onload = e => {
        const i = new Image();
        i.onload = () => {
            let w=i.width, h=i.height;
            if(w>h && w>maxSize) { h*=maxSize/w; w=maxSize; } else if(h>w && h>maxSize) { w*=maxSize/h; h=maxSize; }
            const c = document.createElement('canvas'); c.width=w; c.height=h;
            c.getContext('2d').drawImage(i,0,0,w,h);
            res(c.toDataURL('image/jpeg',0.5)); // High compression for localstorage
        };
        i.src = e.target.result;
    };
    r.readAsDataURL(file);
});

async function createBorrower(e) { 
    e.preventDefault(); const btn = e.target.querySelector('button'); btn.innerText='Saving...'; btn.disabled=true;
    const f=new FormData(e.target); 
    const photoInput = e.target.querySelector('input[name="photo"]');
    const photoBase64 = photoInput.files.length ? await compressImage(photoInput.files[0]) : '';
    
    db.borrowers.push({id:'B'+Date.now(), name:f.get('name'), phone:f.get('phone'), address:f.get('address'), idProof:f.get('idProof'), guarantor:f.get('guarantor'), notes:f.get('notes'), photo:photoBase64, createdAt:today()}); 
    db.save(); switchTab('borrowers'); 
}

function createLoan(e) { 
    e.preventDefault(); const f=new FormData(e.target); 
    db.loans.push({id:'L'+Date.now(), borrowerId:f.get('borrowerId'), amount:parseFloat(f.get('amount')), interest:parseFloat(f.get('interest')), interestType:f.get('interestType'), tenure:parseInt(f.get('tenure')), startDate:f.get('startDate'), collateral:f.get('collateral'), status:'Active', createdAt:today()}); 
    db.save(); switchTab('loans'); 
}

function addPayment(e) { 
    e.preventDefault(); const f=new FormData(e.target), amt=parseFloat(f.get('amount')), lid=f.get('loanId'); 
    db.payments.push({id:'P'+Date.now(), loanId:lid, amount:amt, date:f.get('date'), method:f.get('method'), notes:f.get('notes'), createdAt:today()}); 
    const s=getLoanStats(lid); if(s.balance<=0.01) db.loans.find(l=>l.id===lid).status='Closed'; 
    db.save(); switchTab('payments'); 
}

async function createProperty(e) { 
    e.preventDefault(); const btn = e.target.querySelector('button'); btn.innerText='Saving...'; btn.disabled=true;
    const f=new FormData(e.target); 
    const fileInput = e.target.querySelector('input[name="photos"]');
    const photos = [];
    if(fileInput && fileInput.files.length) { for(let i=0; i<fileInput.files.length; i++) { const b64 = await compressImage(fileInput.files[i]); if(b64) photos.push(b64); } }
    db.properties.push({id:'PR'+Date.now(), title:f.get('title'), type:f.get('type'), location:f.get('location'), purchasePrice:parseFloat(f.get('purchasePrice')), marketValue:parseFloat(f.get('marketValue'))||0, salePrice:parseFloat(f.get('salePrice'))||0, owner:f.get('owner'), status:f.get('status'), notes:f.get('notes'), photos, createdAt:today()}); 
    db.save(); switchTab('properties'); 
}

function addExpense(e) { e.preventDefault(); const f=new FormData(e.target); db.expenses.push({id:'E'+Date.now(), category:f.get('category'), amount:parseFloat(f.get('amount')), date:f.get('date'), description:f.get('description'), createdAt:today()}); db.save(); switchTab('expenses'); }
function addReminder(e) { e.preventDefault(); const f=new FormData(e.target); db.reminders.push({id:'RM'+Date.now(), title:f.get('title'), date:f.get('date'), done:false, createdAt:today()}); db.save(); switchTab('reminders'); }

// ===== UI CONTROLLERS =====
function handleAuth() { 
    const input = document.getElementById('pin-input').value;
    if(input
